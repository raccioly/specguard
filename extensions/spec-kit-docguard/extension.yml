schema_version: "1.0"

extension:
  id: "docguard"
  name: "DocGuard — CDD Enforcement"
  version: "0.9.5"
  description: "Canonical-Driven Development enforcement. Generates, validates, scores, and traces project documentation against 19 automated validators with spec-kit quality checks, config-aware traceability, and AI-ready fix prompts. Zero dependencies."
  author: "Ricardo Accioly"
  repository: "https://github.com/raccioly/docguard"
  license: "MIT"
  homepage: "https://www.npmjs.com/package/docguard-cli"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "node"
      required: true
      version: ">=18.0.0"
    - name: "npx"
      required: true

provides:
  commands:
    - name: "docguard.guard"
      file: "commands/docguard.guard.md"
      description: "Validate project against canonical documentation (19 validators, spec-kit quality checks)"
      aliases: ["speckit.docguard.guard"]

    - name: "docguard.review"
      file: "commands/docguard.review.md"
      description: "Analyze documentation quality and suggest targeted improvements"
      aliases: ["speckit.docguard.review"]

    - name: "docguard.fix"
      file: "commands/docguard.fix.md"
      description: "Generate AI-ready fix prompts for specific documentation issues"
      aliases: ["speckit.docguard.fix"]

    - name: "docguard.score"
      file: "commands/docguard.score.md"
      description: "Calculate CDD maturity score (0-100) with weighted category breakdown"
      aliases: ["speckit.docguard.score"]

    - name: "speckit.docguard.diagnose"
      file: "commands/docguard.review.md"
      description: "Diagnose all issues and generate a complete AI remediation plan"

    - name: "speckit.docguard.generate"
      file: "commands/docguard.fix.md"
      description: "Reverse-engineer canonical docs from existing codebase"

hooks:
  after_tasks:
    command: "docguard.guard"
    optional: true
    prompt: "Run DocGuard validation?"

tags:
  - "documentation"
  - "validation"
  - "quality"
  - "cdd"
  - "spec-driven"
  - "traceability"
  - "ai-agents"
  - "enforcement"
  - "spec-kit"
