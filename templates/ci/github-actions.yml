name: SpecGuard CDD Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  specguard:
    name: CDD Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SpecGuard CI
        run: npx specguard ci --format json --threshold 70 > specguard-report.json

      - name: Display Results
        if: always()
        run: |
          echo "## SpecGuard Report" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat specguard-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specguard-report
          path: specguard-report.json
