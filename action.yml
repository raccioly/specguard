name: 'SpecGuard — CDD Compliance'
description: 'Audit, guard, and score your project for Canonical-Driven Development compliance.'
author: 'Ricardo Accioly'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: audit, guard, score, diff'
    required: false
    default: 'guard'
  format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
  fail-on-warning:
    description: 'Fail the action on warnings (not just errors)'
    required: false
    default: 'false'
  score-threshold:
    description: 'Minimum CDD score to pass (0-100). Only used with score command.'
    required: false
    default: '0'
  working-directory:
    description: 'Project directory to scan'
    required: false
    default: '.'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

outputs:
  score:
    description: 'CDD maturity score (0-100)'
    value: ${{ steps.run.outputs.score }}
  grade:
    description: 'CDD grade (A+, A, B, C, D, F)'
    value: ${{ steps.run.outputs.grade }}
  result:
    description: 'Full JSON result from SpecGuard'
    value: ${{ steps.run.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install SpecGuard
      shell: bash
      run: npm install -g specguard@latest || npx specguard --version

    - name: Run SpecGuard
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e

        # Determine command and flags
        CMD="${{ inputs.command }}"
        FORMAT="${{ inputs.format }}"
        FLAGS=""

        if [ "$FORMAT" = "json" ]; then
          FLAGS="$FLAGS --format json"
        fi

        # Run the command
        if [ "$CMD" = "score" ]; then
          RESULT=$(npx specguard score $FLAGS 2>&1)
          EXIT_CODE=$?

          # Extract score from JSON output
          if [ "$FORMAT" = "json" ]; then
            echo "result=$RESULT" >> $GITHUB_OUTPUT
            SCORE=$(echo "$RESULT" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
            GRADE=$(echo "$RESULT" | grep -o '"grade":"[^"]*"' | head -1 | cut -d'"' -f4)
          else
            SCORE=$(echo "$RESULT" | grep -o '[0-9]*/100' | head -1 | cut -d/ -f1)
            GRADE=$(echo "$RESULT" | grep -o '([A-F+]*)' | head -1 | tr -d '()')
          fi

          echo "score=${SCORE:-0}" >> $GITHUB_OUTPUT
          echo "grade=${GRADE:-F}" >> $GITHUB_OUTPUT
          echo "$RESULT"

          # Check threshold
          THRESHOLD="${{ inputs.score-threshold }}"
          if [ "$THRESHOLD" -gt 0 ] 2>/dev/null && [ "${SCORE:-0}" -lt "$THRESHOLD" ]; then
            echo ""
            echo "::error::CDD score ${SCORE:-0} is below threshold ${THRESHOLD}"
            exit 1
          fi
        elif [ "$CMD" = "guard" ]; then
          npx specguard guard $FLAGS
          EXIT_CODE=$?

          # Handle fail-on-warning
          if [ "${{ inputs.fail-on-warning }}" = "true" ] && [ "$EXIT_CODE" = "2" ]; then
            echo ""
            echo "::error::SpecGuard guard found warnings (fail-on-warning is enabled)"
            exit 1
          fi

          # Exit code 2 = warnings only (not failure by default)
          if [ "$EXIT_CODE" = "2" ] && [ "${{ inputs.fail-on-warning }}" != "true" ]; then
            echo "::warning::SpecGuard guard found warnings"
            exit 0
          fi

          exit $EXIT_CODE
        else
          npx specguard $CMD $FLAGS
          EXIT_CODE=$?
          exit $EXIT_CODE
        fi

    - name: Post Score to PR Comment
      if: inputs.command == 'score' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const score = '${{ steps.run.outputs.score }}' || '?';
          const grade = '${{ steps.run.outputs.grade }}' || '?';

          const emoji = parseInt(score) >= 80 ? '✅' : parseInt(score) >= 60 ? '⚠️' : '❌';
          const body = `## ${emoji} SpecGuard CDD Score: ${score}/100 (${grade})

          | Category | Score |
          |----------|-------|
          | Run \`specguard score --format json\` for full breakdown | |

          > *Automated by [SpecGuard](https://github.com/raccioly/specguard)*`;

          // Find existing comment
          const comments = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.data.find(c =>
            c.body.includes('SpecGuard CDD Score') && c.user.type === 'Bot'
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
